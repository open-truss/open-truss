name: Deploy demo-app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo-app/**'
      - 'packages/open-truss/**'
      - '.github/workflows/deploy-demo-app.yml'

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install & build @open-truss/open-truss
        working-directory: ./packages/open-truss
        run: npm ci && npm run build
      - name: Install & build demo-app
        working-directory: ./demo-app
        run: npm install && npm run build -- --base=/demo-app/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo-app/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
