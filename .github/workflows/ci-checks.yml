run-name: CI Checks on ${{ github.head_ref}} by @${{ github.actor }}

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version-file: 'packages/open-truss/.tool-versions'
          registry-url: 'https://registry.npmjs.org'
      - name: Install client dependencies
        working-directory: ./
        run: npm ci --ignore-scripts
      - name: Run linter
        working-directory: ./
        run: npm run lint:ci
      - name: Type check
        working-directory: ./
        run: npm run typecheck
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install open-truss dependencies
        working-directory: ./packages/open-truss
        run: npm ci --ignore-scripts
      - name: Run open-truss tests
        working-directory: ./packages/open-truss
        run: npm run test
      - name: Install uqi dependencies
        working-directory: ./packages/uqi
        run: npm ci --ignore-scripts
      - name: Run uqi tests
        working-directory: ./packages/uqi
        run: npm run test
