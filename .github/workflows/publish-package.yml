name: Publish Package to npmjs
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v3
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install open-truss dependencies
        working-directory: ./packages/open-truss
        run: npm ci
      - name: Build open-truss
        working-directory: ./packages/open-truss
        run: npm run build
      - name: Publish @open-truss/open-truss
        working-directory: ./packages/open-truss
        run: |
          NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME@$CURRENT" version 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public --ignore-scripts
          else
            echo "Version $CURRENT already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install uqi dependencies
        working-directory: ./packages/uqi
        run: npm ci
      - name: Build uqi
        working-directory: ./packages/uqi
        run: npm run build
      - name: Publish @open-truss/uqi
        working-directory: ./packages/uqi
        run: |
          NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME@$CURRENT" version 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public --ignore-scripts
          else
            echo "Version $CURRENT already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
